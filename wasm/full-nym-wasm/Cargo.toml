[package]
name = "nym-wasm-sdk"
version = "1.2.2"
authors = ["Jedrzej Stuczynski <andrew@nymtech.net>"]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/nymtech/nym"
rust-version = "1.85"
publish = false
keywords = ["nym", "sphinx", "wasm", "webassembly", "privacy"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
nym-client-wasm = { workspace = true, optional = true }

nym-node-tester-wasm = { path = "../node-tester", optional = true }
mix-fetch-wasm = { workspace = true, optional = true }

[features]
default = ["client", "node-tester"]
client = ["nym-client-wasm"]
node-tester = ["nym-node-tester-wasm"]
mix-fetch = ["mix-fetch-wasm"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
