[package]
name = "nym-offline-signers-contract"
version = "0.1.0"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "schema"
required-features = ["schema-gen"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
schemars = { workspace = true }
cosmwasm-std = { workspace = true }
cw2 = { workspace = true }
cw-storage-plus = { workspace = true }
cosmwasm-schema = { workspace = true, optional = true }
cw-controllers = { workspace = true }

nym-contracts-common = { path = "../../common/cosmwasm-smart-contracts/contracts-common" }
nym-offline-signers-common = { path = "../../common/cosmwasm-smart-contracts/offline-signers" }

[dev-dependencies]
anyhow = { workspace = true }
nym-contracts-common-testing = { path = "../../common/cosmwasm-smart-contracts/contracts-common-testing" }

[features]
schema-gen = ["nym-offline-signers-common/schema", "cosmwasm-schema"]

[lints]
workspace = true
