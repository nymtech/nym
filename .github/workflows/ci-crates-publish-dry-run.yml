name: Publish to crates.io (dry run)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.21.0)"
        required: true
        type: string

env:
  CI_BOT_AUTHOR: "Nym bot"
  CI_BOT_EMAIL: "nym-bot@users.noreply.github.com"

jobs:
  publish-dry-run:
    runs-on: arc-linux-latest
    timeout-minutes: 35
    env:
      RUSTUP_PERMIT_COPY_RENAME: 1
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "${{ env.CI_BOT_AUTHOR }}"
          git config --global user.email "${{ env.CI_BOT_EMAIL }}"

      - name: Install rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate version format
        run: |
          if ! npx semver "${{ inputs.version }}"; then
            echo "Error: '${{ inputs.version }}' is not valid semver"
            exit 1
          fi

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep -oP '^\s*version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Cargo.toml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update workspace dependencies
        run: |
          sed -i '/path = /s/version = "${{ steps.current_version.outputs.version }}"/version = "${{ inputs.version }}"/g' Cargo.toml

      - name: Bump versions (local only)
        run: |
          cargo workspaces version custom ${{ inputs.version }} \
            --no-git-commit \
            --yes

      - name: Preflight publish checks
        run: |
          python3 - <<'PY'
          import tomllib
          import pathlib
          import sys

          root = pathlib.Path(".")
          ws = tomllib.loads((root / "Cargo.toml").read_text())
          members = ws["workspace"]["members"]
          errors = []
          workspace_members = {}

          for member in members:
              manifest = root / member / "Cargo.toml"
              if not manifest.exists():
                  continue

              data = tomllib.loads(manifest.read_text())
              package = data.get("package")
              if not package:
                  continue

              publish = package.get("publish", True)
              publishable = publish is not False
              workspace_members[package.get("name", member)] = {
                  "member": member,
                  "manifest": manifest,
                  "publishable": publishable,
                  "data": data,
              }

          def dependency_sections(crate_data):
              for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                  deps = crate_data.get(section, {})
                  if isinstance(deps, dict):
                      yield section, deps

              target = crate_data.get("target", {})
              if isinstance(target, dict):
                  for target_name, target_data in target.items():
                      if not isinstance(target_data, dict):
                          continue
                      for section in ("dependencies", "dev-dependencies", "build-dependencies"):
                          deps = target_data.get(section, {})
                          if isinstance(deps, dict):
                              yield f"target.{target_name}.{section}", deps

          def resolve_workspace_dep_name(dep_name, spec, manifest):
              if not isinstance(spec, dict):
                  return None

              if spec.get("workspace") is True:
                  return dep_name

              candidate = spec.get("package", dep_name)
              if candidate in workspace_members:
                  return candidate

              dep_path = spec.get("path")
              if not dep_path:
                  return None

              dep_manifest = (manifest.parent / dep_path / "Cargo.toml").resolve()
              if not dep_manifest.exists():
                  return None

              dep_data = tomllib.loads(dep_manifest.read_text())
              dep_package = dep_data.get("package", {})
              resolved_name = dep_package.get("name")
              if resolved_name in workspace_members:
                  return resolved_name
              return None

          for member in members:
              manifest = root / member / "Cargo.toml"
              if not manifest.exists():
                  continue

              data = tomllib.loads(manifest.read_text())
              package = data.get("package")
              if not package:
                  continue
              if package.get("publish", True) is False:
                  continue

              crate_name = package.get("name", member)

              for field in ("description", "license", "repository"):
                  value = package.get(field)
                  has_value = (
                      (isinstance(value, str) and bool(value.strip()))
                      or (isinstance(value, dict) and value.get("workspace") is True)
                  )
                  if not has_value:
                      errors.append(
                          f"{member}: package '{crate_name}' missing required field '{field}'"
                      )

              for section, dependencies in dependency_sections(data):
                  for dep_name, spec in dependencies.items():
                      if isinstance(spec, dict) and "path" in spec:
                          if spec.get("workspace") is True:
                              continue
                          if "version" not in spec:
                              errors.append(
                                  f"{member}: {section} '{dep_name}' uses path dependency without version ({spec['path']})"
                              )

                      resolved_dep = resolve_workspace_dep_name(dep_name, spec, manifest)
                      if (
                          resolved_dep
                          and resolved_dep in workspace_members
                          and not workspace_members[resolved_dep]["publishable"]
                      ):
                          errors.append(
                              f"{member}: package '{crate_name}' ({section}) depends on non-publishable workspace crate '{resolved_dep}'"
                          )

          workspace_deps = ws.get("workspace", {}).get("dependencies", {})
          for dep_name, spec in workspace_deps.items():
              if isinstance(spec, dict) and "path" in spec and "version" not in spec:
                  errors.append(
                      f"workspace.dependencies: '{dep_name}' has path but no version"
                  )

          if errors:
              print("Preflight checks failed:")
              for err in errors:
                  print(f"- {err}")
              sys.exit(1)

          print("Preflight checks passed.")
          PY

      # Dry run may show cascading dependency errors because packages aren't
      # actually uploaded - these are expected and ignored. We check for real
      # errors like packaging failures, missing metadata, or invalid Cargo.toml.
      - name: Publish (dry run)
        run: |
          set +e
          publish_status=1
          max_attempts=2
          attempt=1
          rm -f /tmp/publish-dry-run.log

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Dry-run publish attempt ${attempt}/${max_attempts}"
            cargo workspaces publish --dry-run --allow-dirty 2>&1 | tee /tmp/publish-dry-run.log
            publish_status=${PIPESTATUS[0]}

            if [ "$publish_status" -eq 0 ]; then
              break
            fi

            # Retry once for interruption/runner issues.
            if [ "$attempt" -lt "$max_attempts" ] && \
              { [ "$publish_status" -eq 130 ] || [ "$publish_status" -eq 137 ]; }; then
              echo "Publish dry-run interrupted (exit ${publish_status}), retrying in 10s..."
              sleep 10
              attempt=$((attempt + 1))
              continue
            fi

            break
          done
          set -e

          if grep -Eiq \
            "failed to verify manifest|failed to parse manifest|invalid Cargo.toml|error: package .* has no (description|license|repository)" \
            /tmp/publish-dry-run.log; then
            echo "Detected real packaging/manifest errors"
            exit 1
          fi

          # In dry-run mode, non-zero publish status is expected due to
          # dependency-cascade failures against crates.io index.
          if [ "$publish_status" -ne 0 ]; then
            echo "Dry-run publish returned non-zero (${publish_status}) but no real manifest blockers were detected."
          fi

          echo "Only expected dry-run dependency cascade errors detected (if any)."

      # Show the list of packages published
      - name: Show package versions
        run: cargo workspaces list --long
