    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nym Wallet</title>
    <style>
      /* Match dark theme `background.default` (#242B2D) before React/MUI CssBaseline runs. */
      html {
        color-scheme: dark;
      }
      html,
      body {

        background-color: #242b2d;

        overflow-x: hidden;
        overflow-y: auto;
        background-color: #242b2d;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
