name: Publish crates to crates.io

on:
  workflow_dispatch:
    inputs:
      publish_interval:
        description: "Seconds to wait between publishes (600 for first publish, 60 after)"
        required: false
        default: "600"
        type: string

jobs:
  publish:
    runs-on: arc-linux-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      # We need `--allow-dirty` in case there are any untracked files.
      # `--publish-as-is` skips version bumping since that's done separately.
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo workspaces publish \
            --publish-as-is \
            --allow-dirty \
            --publish-interval ${{ inputs.publish_interval }}

      - name: Show package versions
        run: cargo workspaces list --long
