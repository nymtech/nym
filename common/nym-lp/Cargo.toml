[package]
name = "nym-lp"
description = "Lewes Protocol session and transport layer for the Nym network"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
rust-version.workspace = true
readme.workspace = true
publish = true

[dependencies]
# Always available (light deps only)
thiserror = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
num_enum = { workspace = true }
nym-common.workspace = true

# Heavy deps — gated behind "full"
bs58 = { workspace = true, optional = true }
rand09 = { workspace = true, optional = true }
tls_codec = { workspace = true, optional = true }
tokio = { workspace = true, features = ["net", "io-util"], optional = true }
zeroize = { workspace = true, features = ["zeroize_derive"], optional = true }
nym-crypto = { workspace = true, features = ["hashing"], optional = true }
nym-kkt = { workspace = true, optional = true }
nym-kkt-ciphersuite = { workspace = true, optional = true }
libcrux-psq = { workspace = true, features = ["test-utils"], optional = true }

# needed for the 'mock' feature
nym-test-utils = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true, features = ["html_reports"] }
nym-test-utils = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[features]
default = ["full"]
full = [
    "dep:bs58",
    "dep:rand09",
    "dep:tls_codec",
    "dep:tokio",
    "dep:zeroize",
    "dep:nym-crypto",
    "dep:nym-kkt",
    "dep:nym-kkt-ciphersuite",
    "dep:libcrux-psq",
]
mock = ["full", "nym-test-utils"]

[[bench]]
name = "replay_protection"
harness = false
