name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.21.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: arc-linux-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Validate version format
        run: |
          if ! npx semver "${{ inputs.version }}"; then
            echo "Error: '${{ inputs.version }}' is not valid semver"
            exit 1
          fi

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep -oP '^\s*version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Cargo.toml | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump versions
        run: |
          cargo workspaces version ${{ inputs.version }} \
            --no-git-commit \
            --no-git-push \
            --no-git-tag \
            --yes

      - name: Update workspace dependencies
        run: |
          sed -i 's/version = "${{ steps.current_version.outputs.version }}"/version = "${{ inputs.version }}"/g' Cargo.toml

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo workspaces publish --from-git --no-git-commit --allow-dirty

      # - name: Push version commit
      #   run: |
      #     git push origin HEAD
